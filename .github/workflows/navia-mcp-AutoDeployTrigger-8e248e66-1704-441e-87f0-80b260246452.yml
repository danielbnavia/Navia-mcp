name: Trigger auto deployment for navia-mcp

# When this action will be executed
on:
  # Automatically trigger it when detected changes in repo
  push:
    branches: 
      [ main ]
    paths:
    - '**'
    - '.github/workflows/navia-mcp-AutoDeployTrigger-8e248e66-1704-441e-87f0-80b260246452.yml'

  # Allow manual trigger 
  workflow_dispatch:      

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions: 
      id-token: write #This is required for requesting the OIDC JWT Token
      contents: read #Required when GH token is used to authenticate with private repo

    steps:
      - name: Checkout to the branch
        uses: actions/checkout@v2

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.NAVIAMCP_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.NAVIAMCP_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.NAVIAMCP_AZURE_SUBSCRIPTION_ID }}

      - name: Build and push container image to registry
        uses: azure/container-apps-deploy-action@v2
        with:
          appSourcePath: ${{ github.workspace }}
          _dockerfilePathKey_: _dockerfilePath_
          _targetLabelKey_: _targetLabel_
          registryUrl: cad7a591787facr.azurecr.io
          registryUsername: ${{ secrets.NAVIAMCP_REGISTRY_USERNAME }}
          registryPassword: ${{ secrets.NAVIAMCP_REGISTRY_PASSWORD }}
          containerAppName: navia-mcp
          resourceGroup: DefaultResourceGroup-SEAU
          imageToBuild: cad7a591787facr.azurecr.io/navia-mcp:${{ github.sha }}
          _buildArgumentsKey_: |
            _buildArgumentsValues_


